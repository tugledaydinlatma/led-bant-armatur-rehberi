<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yazı Görüntüleyici</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0a0f; color: #e5e7eb; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body>
    <div id="content" class="max-w-4xl mx-auto p-8">
        <div class="text-center py-12">
            <div class="loading-spinner mx-auto mb-4" style="border:3px solid rgba(245,158,11,0.1);border-top:3px solid #f59e0b;border-radius:50%;width:40px;height:40px;animation:spin 1s linear infinite;"></div>
            <p class="text-gray-400">Yazı yükleniyor...</p>
        </div>
    </div>
    
    <script>
        const params = new URLSearchParams(window.location.search);
        const articleUrl = params.get('article');
        
        if (!articleUrl) {
            document.getElementById('content').innerHTML = '<p class="text-red-400 text-center">Yazı bulunamadı.</p>';
        } else {
            // GitHub raw URL'e çevir
            const rawUrl = articleUrl
                .replace('github.com', 'raw.githubusercontent.com')
                .replace('/blob/', '/');
            
            fetch(rawUrl)
                .then(r => r.text())
                .then(html => {
                    // Sadece body içeriğini al veya tüm HTML'i göster
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, 'text/html');
                    const bodyContent = doc.body.innerHTML;
                    
                    document.getElementById('content').innerHTML = `
                        <a href="index.html" class="text-led-400 hover:text-led-300 mb-6 inline-flex items-center gap-2">
                            ← Ana Sayfa
                        </a>
                        <div class="prose prose-invert max-w-none">
                            ${bodyContent}
                        </div
