<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yazı - Elektrik Aydınlatma</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0a0f; color: #e5e7eb; font-family: 'Inter', sans-serif; }
        .article-content { max-width: 48rem; margin: 0 auto; padding: 2rem 1rem; }
        .article-content h1, .article-content h2 { color: #f59e0b; }
        .article-content img { max-width: 100%; height: auto; }
        .loading-spinner { border: 3px solid rgba(245,158,11,0.1); border-top: 3px solid #f59e0b; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 4rem auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <nav style="position: sticky; top: 0; background: rgba(10,10,15,0.9); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); padding: 1rem;">
        <div style="max-width: 48rem; margin: 0 auto; display: flex; justify-content: space-between; align-items: center;">
            <a href="/" style="color: #fbbf24; text-decoration: none; font-weight: 600;">← Ana Sayfa</a>
            <a href="https://wa.me/905322471280" style="background: #f59e0b; color: #0a0a0f; padding: 0.5rem 1rem; border-radius: 9999px; text-decoration: none; font-weight: 600;">WhatsApp</a>
        </div>
    </nav>

    <div id="loading"><div class="loading-spinner"></div></div>
    <div id="error" style="display: none; text-align: center; padding: 4rem; color: #fca5a5;"></div>
    <div id="content" class="article-content" style="display: none;"></div>

    <script>
        const file = new URLSearchParams(location.search).get('article');
        
        if (!file) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'block';
            document.getElementById('error').textContent = 'Makale seçilmedi';
        } else {
            fetch(file + '?v=' + Date.now())
                .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
                .then(html => {
                    const body = html.match(/<body[^>]*>([\s\S]*)<\/body>/i);
                    document.getElementById('content').innerHTML = body ? body[1] : html;
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('content').style.display = 'block';
                })
                .catch(err => {
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('error').style.display = 'block';
                    document.getElementById('error').textContent = 'Yükleme hatası: ' + err.message;
                });
        }
    </script>
</body>
</html>
