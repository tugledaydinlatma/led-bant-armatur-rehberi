name: Auto Update Articles and Sitemap

on:
  push:
    branches: [ main, master ]
    paths:
      - 'Arsiv/**'
      - 'articles.json'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-articles:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: pip install beautifulsoup4
    
    - name: Auto-generate articles.json
      run: python .github/scripts/update_articles.py
    
    - name: Generate sitemap.xml
      run: python .github/scripts/generate_sitemap.py
    
    - name: Ping search engines
      run: python .github/scripts/ping_search_engines.py
    
    - name: Commit and push changes
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add articles.json sitemap.xml
        if git diff --cached --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Auto-update articles.json and sitemap.xml"
          git push
        fi
